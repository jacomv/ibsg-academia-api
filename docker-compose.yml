version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: academia_postgres
    environment:
      POSTGRES_DB: academia_db
      POSTGRES_USER: academia_user
      POSTGRES_PASSWORD: academia_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academia_user -d academia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: academia_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ibsg.app
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
